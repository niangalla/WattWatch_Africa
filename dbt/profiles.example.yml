# Copier vers ~/.dbt/profiles.yml (ou utiliser --profiles-dir avec ce dossier).
wattwatch:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'WATTWATCH_TRANSFORM') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'WATTWATCH') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'WATTWATCH_WH') }}"
      schema: BRONZE
      threads: 4
