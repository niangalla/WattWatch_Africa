# Stack locale WattWatch : Airflow (LocalExecutor + Postgres) + MinIO (landing zone S3).
#
#   docker compose up -d --build
#   UI Airflow : http://localhost:8080  (admin / admin)
#   Console MinIO : http://localhost:9001  (minioadmin / minioadmin)
#
# Snowflake et Power BI restent des services externes (non dockerisables) :
# renseigner AIRFLOW_CONN_SNOWFLAKE_WATTWATCH dans .env pour activer les DAGs
# wattwatch_load et wattwatch_dbt.
name: wattwatch

x-airflow-common: &airflow-common
  build: .
  image: wattwatch-airflow:latest
  env_file: .env                       
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__DAGS_FOLDER: /opt/wattwatch/dags
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  volumes:
    - .:/opt/wattwatch
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    minio-init:
      condition: service_completed_successfully

services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 10
    volumes:
      - postgres-db:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    command: server /data --console-address ":9001"
    env_file: .env
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 10
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/${WATTWATCH_S3_BUCKET}
      "

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username ${AIRFLOW_ADMIN_USERNAME}
      --password ${AIRFLOW_ADMIN_PASSWORD}
      --firstname ${AIRFLOW_ADMIN_FIRSTNAME}
      --lastname ${AIRFLOW_ADMIN_LASTNAME}
      --role ${AIRFLOW_ADMIN_ROLE}
      --email ${AIRFLOW_ADMIN_EMAIL}"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres-db:
  minio-data:
  airflow-logs:
