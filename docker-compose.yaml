# Stack locale WattWatch : Airflow (LocalExecutor + Postgres) + MinIO (landing zone S3).
#
#   docker compose up -d --build
#   UI Airflow : http://localhost:8080  (admin / admin)
#   Console MinIO : http://localhost:9001  (minioadmin / minioadmin)
#
# Snowflake et Power BI restent des services externes (non dockerisables) :
# renseigner AIRFLOW_CONN_SNOWFLAKE_WATTWATCH dans .env pour activer les DAGs
# wattwatch_load et wattwatch_dbt.
name: wattwatch

x-airflow-common: &airflow-common
  build: .
  image: wattwatch-airflow:latest
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__DAGS_FOLDER: /opt/wattwatch/dags
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    # Landing zone : MinIO émule S3 (mêmes réglages que le vrai S3, seul l'endpoint change)
    WATTWATCH_S3_BUCKET: wattwatch
    AWS_ACCESS_KEY_ID: minioadmin
    AWS_SECRET_ACCESS_KEY: minioadmin
    AWS_DEFAULT_REGION: us-east-1
    AWS_ENDPOINT_URL: http://minio:9000
    # Snowflake (vide tant que le compte n'est pas créé — cf. .env.example)
    AIRFLOW_CONN_SNOWFLAKE_WATTWATCH: ${AIRFLOW_CONN_SNOWFLAKE_WATTWATCH:-}
  volumes:
    - .:/opt/wattwatch
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    minio-init:
      condition: service_completed_successfully

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10
    volumes:
      - postgres-db:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 10
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/wattwatch
      "

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username admin --password admin
      --firstname Admin --lastname WattWatch --role Admin
      --email admin@wattwatch.local || true
      "

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres-db:
  minio-data:
  airflow-logs:
