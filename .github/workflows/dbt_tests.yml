name: dbt

on:
  pull_request:
    paths: ["dbt/**"]

jobs:
  dbt-parse:
    # Valide la compilation du projet dbt (pas de connexion Snowflake en CI pour l'instant ;
    # le `dbt build` complet contre un schéma CI viendra en Phase 3)
    runs-on: ubuntu-latest
    env:
      SNOWFLAKE_ACCOUNT: ci-dummy
      SNOWFLAKE_USER: ci
      SNOWFLAKE_PASSWORD: ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: pip install dbt-snowflake

      - name: dbt parse
        working-directory: dbt
        run: |
          cp profiles.example.yml profiles.yml
          dbt parse --profiles-dir .
